<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ 'Edit' if route else 'Add' }} Route - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px 0; }
        .card { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; }
        .btn-primary { background: linear-gradient(45deg, #667eea, #764ba2); border: none; border-radius: 25px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-body">
                <h4>{{ 'Edit' if route else 'Add' }} Route</h4>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Route Name *</label>
                        <input type="text" name="route_name" class="form-control" value="{{ route.route_name if route else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Start Point</label>
                        <input type="text" name="start_point" class="form-control" value="{{ route.start_point if route else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">End Point / Destination</label>
                        <input type="text" name="end_point" class="form-control" value="{{ route.end_point if route else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Stops (comma-separated)</label>
                        <input type="text" name="stops" class="form-control" value="{{ route.stops if route else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Assigned Driver</label>
                        <select name="driver_id" class="form-select">
                            <option value="">-- None --</option>
                            {% for d in drivers %}
                            <option value="{{ d.user_id }}" {{ 'selected' if route and route.driver_id == d.user_id else '' }}>{{ d.username }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a href="{{ url_for('admin_routes') }}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
