<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Login - Smart Campus Transit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .login-card { background: rgba(255,255,255,0.95); border-radius: 15px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 420px; width: 100%; }
        .btn-primary { background: linear-gradient(45deg, #667eea, #764ba2); border: none; border-radius: 25px; padding: 12px; font-weight: 600; }
        .form-control { border-radius: 10px; padding: 12px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="fas fa-user-friends fa-3x text-primary"></i>
            <h2 class="mt-2">Parent Login</h2>
            <p class="text-muted">Select your child and enter password</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for cat, msg in messages %}
                    <div class="alert alert-{{ 'success' if cat == 'success' else 'danger' }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Student Name</label>
                <select name="student_id" class="form-select" required>
                    <option value="">-- Select Student --</option>
                    {% for s in students %}
                    <option value="{{ s.student_id }}">{{ s.name }} ({{ s.roll_number }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required placeholder="Parent password">
            </div>
            <button type="submit" class="btn btn-primary w-100"><i class="fas fa-sign-in-alt"></i> Login</button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('index') }}" class="text-primary">Back to Home</a> &nbsp;|&nbsp;
            <a href="{{ url_for('login') }}" class="text-primary">Staff / Student Login</a>
        </div>
    </div>
</body>
</html>
