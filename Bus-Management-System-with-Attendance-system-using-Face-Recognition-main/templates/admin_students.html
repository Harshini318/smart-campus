<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background: rgba(255,255,255,0.95); }
        .card { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-primary { background: linear-gradient(45deg, #667eea, #764ba2); border: none; border-radius: 25px; font-weight: 600; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('admin_dashboard') }}"><i class="fas fa-bus"></i> Smart Campus Transit</a>
            <a class="nav-link" href="{{ url_for('admin_dashboard') }}">Dashboard</a>
            <a class="nav-link" href="{{ url_for('admin_routes') }}">Routes</a>
            <a class="nav-link" href="{{ url_for('admin_students') }}">Students</a>
            <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="card">
            <div class="card-body">
                <h4><i class="fas fa-users"></i> Manage Students</h4>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr><th>ID</th><th>Name</th><th>Roll No</th><th>Department</th><th>Year</th></tr>
                        </thead>
                        <tbody>
                            {% for s in students %}
                            <tr>
                                <td>{{ s.student_id }}</td>
                                <td>{{ s.name }}</td>
                                <td>{{ s.roll_number or '-' }}</td>
                                <td>{{ s.department or '-' }}</td>
                                <td>{{ s.year or '-' }}</td>
                            </tr>
                            {% else %}
                            <tr><td colspan="5" class="text-muted">No students.</td></tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
