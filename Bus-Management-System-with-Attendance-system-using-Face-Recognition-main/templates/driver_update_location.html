<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Location - Smart Campus Transit System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .location-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 800px;
            margin: 30px auto;
        }
        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }
        .header-section h2 {
            color: #667eea;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .form-control {
            border-radius: 10px;
            border: 1px solid #ddd;
            padding: 12px;
        }
        .btn-success {
            background: linear-gradient(45deg, #28a745, #20c997);
            border: none;
            border-radius: 25px;
            padding: 12px 25px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }
        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            border-radius: 25px;
            padding: 12px 25px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .status-message {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-weight: 500;
        }
        .status-success {
            background: linear-gradient(45deg, #d4edda, #c3e6cb);
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status-error {
            background: linear-gradient(45deg, #f8d7da, #f5c6cb);
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .location-icon {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 20px;
        }
        .current-time {
            font-size: 1.1rem;
            color: #667eea;
            font-weight: 600;
        }
        .quick-locations {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .quick-location-btn {
            padding: 10px;
            border: 2px solid #667eea;
            border-radius: 10px;
            background: rgba(102, 126, 234, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .quick-location-btn:hover {
            background: rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('driver_dashboard') }}">
                <i class="fas fa-bus"></i> Smart Campus Transit
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('driver_dashboard') }}">
                    <i class="fas fa-home"></i> Dashboard
                </a>
                <a class="nav-link" href="{{ url_for('driver_attendance') }}">
                    <i class="fas fa-user-check"></i> Attendance
                </a>
                <span class="navbar-text me-3 current-time" id="currentTime"></span>
                <a class="nav-link" href="{{ url_for('logout') }}">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <div class="location-card">
        <!-- Header -->
        <div class="header-section">
            <i class="fas fa-map-marked-alt location-icon"></i>
            <h2>Update Bus Location</h2>
            <p class="text-muted">Keep students informed about your current location and ETA</p>
            <div class="mt-3">
                <button type="button" id="trackBtn" class="btn btn-info btn-lg">
                    <i class="fas fa-crosshairs"></i> Track – Share my exact location (GPS)
                </button>
                <span id="trackStatus" class="ms-2 small"></span>
            </div>
        </div>

        <form id="locationForm">
            <!-- Current Location -->
            <div class="mb-4">
                <label for="current_location" class="form-label">
                    <i class="fas fa-map-pin"></i> Current Location *
                </label>
                <input type="text" class="form-control" id="current_location" name="current_location" 
                       placeholder="e.g., Near City Center Bus Stop" required>
                
                <!-- Quick Location Buttons -->
                <div class="quick-locations mt-3">
                    <div class="quick-location-btn" onclick="setLocation('City Center Bus Stop')">
                        <i class="fas fa-bus"></i> City Center
                    </div>
                    <div class="quick-location-btn" onclick="setLocation('Railway Station')">
                        <i class="fas fa-train"></i> Railway Station
                    </div>
                    <div class="quick-location-btn" onclick="setLocation('Main Road Junction')">
                        <i class="fas fa-traffic-light"></i> Main Junction
                    </div>
                    <div class="quick-location-btn" onclick="setLocation('College Gate')">
                        <i class="fas fa-graduation-cap"></i> College Gate
                    </div>
                </div>
            </div>
            
            <!-- Destination -->
            <div class="mb-4">
                <label for="destination" class="form-label">
                    <i class="fas fa-flag-checkered"></i> Destination *
                </label>
                <select class="form-control" id="destination" name="destination" required>
                    <option value="">Select Destination</option>
                    <option value="College Campus">College Campus</option>
                    <option value="City Center">City Center</option>
                    <option value="Railway Station">Railway Station</option>
                    <option value="Bus Terminal">Bus Terminal</option>
                </select>
            </div>
            
            <!-- Distance Left -->
            <div class="row mb-4">
                <div class="col-md-6">
                    <label for="distance_left" class="form-label">
                        <i class="fas fa-road"></i> Distance Left *
                    </label>
                    <input type="text" class="form-control" id="distance_left" name="distance_left" 
                           placeholder="e.g., 5 km" required>
                </div>
                <div class="col-md-6">
                    <label for="estimated_time" class="form-label">
                        <i class="fas fa-clock"></i> Estimated Time (Optional)
                    </label>
                    <input type="text" class="form-control" id="estimated_time" name="estimated_time" 
                           placeholder="e.g., 15 minutes">
                </div>
            </div>
            
            <!-- Message -->
            <div class="mb-4">
                <label for="message" class="form-label">
                    <i class="fas fa-comment"></i> Message for Students *
                </label>
                <textarea class="form-control" id="message" name="message" rows="3" 
                          placeholder="e.g., Bus is running 10 minutes late due to traffic" required></textarea>
            </div>
            
            <!-- Submit Button -->
            <div class="text-center">
                <button type="submit" class="btn btn-success btn-lg">
                    <i class="fas fa-paper-plane"></i> Update Location
                </button>
                <a href="{{ url_for('driver_dashboard') }}" class="btn btn-outline-secondary btn-lg ms-3">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </a>
            </div>
        </form>
        
        <div id="statusMessage"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Update current time
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
            const dateString = now.toLocaleDateString('en-US', { 
                weekday: 'short', 
                month: 'short', 
                day: 'numeric' 
            });
            document.getElementById('currentTime').textContent = `${dateString} | ${timeString}`;
        }
        
        updateTime();
        setInterval(updateTime, 1000);
        
        // Set location from quick buttons
        function setLocation(location) {
            document.getElementById('current_location').value = location;
        }
        
        // Handle form submission
        $('#locationForm').submit(function(e) {
            e.preventDefault();
            
            $('#statusMessage').hide();
            
            $.ajax({
                url: '/driver/update_location',
                type: 'POST',
                data: $(this).serialize(),
                success: function(response) {
                    if (response.success) {
                        showStatus(response.message, 'success');
                        // Clear form after successful submission
                        $('#locationForm')[0].reset();
                    } else {
                        showStatus(response.error || 'Error updating location', 'error');
                    }
                },
                error: function(xhr, status, error) {
                    showStatus('Error updating location: ' + (xhr.responseJSON ? xhr.responseJSON.error : error), 'error');
                }
            });
        });
        
        function showStatus(message, type) {
            var statusClass = 'status-' + type;
            var icon = type === 'success' ? 'check-circle' : 'exclamation-triangle';
            
            $('#statusMessage').html(
                '<div class="status-message ' + statusClass + '">' +
                '<i class="fas fa-' + icon + '"></i> ' + message +
                '</div>'
            ).show();
        }
        
        $('#trackBtn').click(function() {
            var btn = $(this);
            if (!navigator.geolocation) {
                $('#trackStatus').text('Geolocation not supported').css('color', 'red');
                return;
            }
            $('#trackStatus').text('Getting location...').css('color', '');
            btn.prop('disabled', true);
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    $.ajax({
                        url: '/driver/track_location',
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify({ latitude: pos.coords.latitude, longitude: pos.coords.longitude }),
                        success: function(r) {
                            if (r.success) {
                                $('#trackStatus').text('Location shared! Students/parents can see it on the map.').css('color', 'green');
                            } else {
                                $('#trackStatus').text(r.error || 'Failed').css('color', 'red');
                            }
                        },
                        error: function() {
                            $('#trackStatus').text('Request failed').css('color', 'red');
                        }
                    });
                    btn.prop('disabled', false);
                },
                function(err) {
                    $('#trackStatus').text('Location error: ' + (err.message || 'denied')).css('color', 'red');
                    btn.prop('disabled', false);
                }
            );
        });
    </script>
</body>
</html>
